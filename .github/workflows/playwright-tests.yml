name: Playwright Testson:  push:    branches:      - main  pull_request:    branches:      - mainjobs:  test:    runs-on: ubuntu-latest    steps:      - name: Checkout Repository        uses: actions/checkout@v4      - name: Setup Java 17        uses: actions/setup-java@v4        with:          distribution: temurin          java-version: 17      - name: Cache Maven packages        uses: actions/cache@v4        with:          path: ~/.m2          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}      - name: Install Playwright Browsers        run: |          mvn exec:java \          -Dexec.mainClass=com.microsoft.playwright.CLI \          -Dexec.args="install chromium"      - name: Run Tests        run: mvn clean test      - name: Upload Evidences        if: always()        uses: actions/upload-artifact@v4        with:          name: evidencias-playwright          path: evidencias/